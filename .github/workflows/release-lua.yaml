name: Release Lua Extension Manually

on:
  workflow_dispatch:
    inputs:
      extension:
        description: 'Relative path of the Lua extension to extensions/ (e.g., "example-lua"). The extension must have a manifest.yaml with type: lua.'
        required: true
        type: string
      nonce:
        description: 'Optional nonce to append to the image tag for uniqueness.'
        required: false
        type: string

env:
  OCI_REGISTRY: ghcr.io/tetratelabs

jobs:
  release-lua:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64,arm64
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.OCI_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate extension exists
        run: |
          if [ ! -f "extensions/${{ inputs.extension }}/manifest.yaml" ]; then
            echo "Error: Extension 'extensions/${{ inputs.extension }}/manifest.yaml' not found"
            exit 1
          fi
          if ! grep -q "type: lua" "extensions/${{ inputs.extension }}/manifest.yaml"; then
            echo "Error: Extension '${{ inputs.extension }}' is not a lua extension"
            exit 1
          fi

      - name: Build and Push Lua Extension
        env:
          EXTENSION_PATH: ${{ inputs.extension }}
          IMAGE_NONCE: ${{ inputs.nonce }}
        run: make -C extensions push_lua
