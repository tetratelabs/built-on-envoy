name: Auto Release Extensions

on:
  push:
    branches:
      - main
    paths:
      - 'extensions/*/manifest.yaml'

env:
  OCI_REGISTRY: ghcr.io/tetratelabs

jobs:
  detect-version-changes:
    runs-on: ubuntu-latest
    outputs:
      changed-extensions: ${{ steps.detect.outputs.extensions }}
      has-changes: ${{ steps.detect.outputs.has-changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need at least 2 commits to compare

      - name: Detect version changes
        id: detect
        run: |
          set -e
          
          echo "Checking for version changes in manifest.yaml files..."
          
          # Array to store changed extensions
          changed_extensions="[]"
          has_changes="false"
          
          # Get all changed manifest.yaml files in top-level extension directories
          changed_manifests=$(git diff --name-only HEAD~1 HEAD | grep '^extensions/[^/]*/manifest.yaml$' || true)
          
          if [ -z "$changed_manifests" ]; then
            echo "No manifest.yaml files changed"
            echo "extensions=$changed_extensions" >> "$GITHUB_OUTPUT"
            echo "has-changes=$has_changes" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          echo "Changed manifests: $changed_manifests"
          
          # Check each changed manifest for version changes or new extensions
          for manifest in $changed_manifests; do
            echo "Checking $manifest..."
            
            # Extract extension name (directory name)
            extension=$(echo "$manifest" | cut -d'/' -f2)
            
            # Get old and new versions
            # For new extensions, old_version will be empty string
            old_version=$(git show HEAD~1:"$manifest" 2>/dev/null | grep '^version:' | sed 's/[^:]*:[[:space:]]*//g' | tr -d '"' || echo "")
            new_version=$(grep '^version:' "$manifest" | sed 's/[^:]*:[[:space:]]*//g' | tr -d '"' || echo "")
            
            echo "Extension: $extension"
            echo "Old version: ${old_version:-<new extension>}"
            echo "New version: $new_version"
            
            # Check if version changed or this is a new extension
            # New extensions will have empty old_version and non-empty new_version
            if [ "$old_version" != "$new_version" ] && [ -n "$new_version" ]; then
              if [ -z "$old_version" ]; then
                echo "New extension detected: $extension (version: $new_version)"
              else
                echo "Version changed for $extension: $old_version -> $new_version"
              fi
              
              # Get extension type
              ext_type=$(grep '^type:' "$manifest" | sed 's/[^:]*:[[:space:]]*//g' | tr -d '"' || echo "unknown")
              
              # Add to changed extensions list
              changed_extensions=$(echo "$changed_extensions" | jq -c --arg name "$extension" --arg type "$ext_type" --arg version "$new_version" '. += [{"name": $name, "type": $type, "version": $version}]')
              has_changes="true"
            else
              echo "No version change for $extension"
            fi
          done
          
          echo "Changed extensions: $changed_extensions"
          echo "extensions=$changed_extensions" >> "$GITHUB_OUTPUT"
          echo "has-changes=$has_changes" >> "$GITHUB_OUTPUT"

  release-extensions:
    needs: detect-version-changes
    if: needs.detect-version-changes.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        extension: ${{ fromJson(needs.detect-version-changes.outputs.changed-extensions) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      
      - uses: docker/setup-buildx-action@v3
      
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64,arm64
      
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io/tetratelabs
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Lua Extension
        if: matrix.extension.type == 'lua'
        env:
          EXTENSION_PATH: ${{ matrix.extension.name }}
        run: |
          echo "Releasing lua extension: ${{ matrix.extension.name }} (version: ${{ matrix.extension.version }})"
          make -C extensions push_lua

      - name: Release Composer
        if: matrix.extension.name == 'composer'
        run: |
          echo "Releasing composer extension (version: ${{ matrix.extension.version }})"
          make -C extensions/composer push_image
      
      - name: Release Lite Composer
        if: matrix.extension.name == 'composer'
        env:
          COMPOSER_LITE: true
        run: make -C extensions/composer push_image

      - name: Push Composer source code
        if: matrix.extension.name == 'composer'
        run: make -C extensions/composer push_code

      - name: Push Composer plugins
        if: matrix.extension.name == 'composer'
        run: make -C extensions/composer push_plugins
