name: Release CLI

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+**']  # Ex. v0.2.0, v0.2.1-rc2
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag'
        required: true

env:
  GOPROXY: https://proxy.golang.org
  GOOS_LIST: linux darwin
  GOARCH_LIST: amd64 arm64

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64,arm64

      - name: "Set release tag"
        shell: bash
        run: |
          # Set the TAG to force the version of the Docker images
          TAG="${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}"
          # Strip the `v` prefix if it exists, as our tags are in the format `v0.2.0` but we want the version to be `0.2.0`
          echo "TAG=${TAG#v}" >> "$GITHUB_ENV"

      - run: make -C cli push_image

      # If it is an RC, upload the release bundle as an artifact, as we won't be generating
      # a GitHub release for RCs.
      - uses: actions/upload-artifact@v6
        if: contains(github.ref, '-rc')
        with:
          name: cli-binaries
          path: cli/out/
          if-no-files-found: ignore

      # Only generate GitHub releases for final releases, not RCs.
      - uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref, '-rc')
        with:
          files: cli/out/*
          draft: true
          generate_release_notes: true
