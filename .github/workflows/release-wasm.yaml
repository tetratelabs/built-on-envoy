name: Release Wasm Extension Manually

on:
  workflow_dispatch:
    inputs:
      extension:
        description: 'Wasm extension name (e.g., example-wasm-go)'
        required: true
        type: string
      nonce:
        description: 'Optional nonce to append to the image tag for uniqueness.'
        required: false
        type: string

env:
  OCI_REGISTRY: ghcr.io/tetratelabs

jobs:
  release-wasm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      # Wasm modules are architecture-independent, so no QEMU/multi-arch setup is
      # needed; push_wasm cross-compiles to wasip1/wasm and pushes a single manifest.
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.OCI_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Wasm Extension
        env:
          EXTENSION_PATH: ${{ inputs.extension }}
          IMAGE_NONCE: ${{ inputs.nonce }}
        run: |
          echo "Releasing Wasm extension: ${{ inputs.extension }}"
          make -C extensions push_wasm push_code
