name: Rust Extensions

on:
  workflow_call:
    inputs:
      extensions:
        description: 'JSON array of extensions to check'
        required: true
        type: string

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        extension: ${{ fromJson(inputs.extensions) }}
    defaults:
      run:
        working-directory: extensions/${{ matrix.extension.path }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools
      - uses: taiki-e/install-action@cargo-llvm-cov

      - run: make format
      - run: make lint
      - run: make build
      - run: make test-coverage
        env:
          COVERAGE_THRESHOLD: 80
      
      - uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: extensions/${{ matrix.extension.path }}/target/lcov.info
          flags: extensions
