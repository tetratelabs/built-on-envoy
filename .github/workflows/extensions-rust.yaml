name: Rust Extensions

on:
  workflow_call:
    inputs:
      extensions:
        description: 'JSON array of extensions to check'
        required: true
        type: string

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        extension: ${{ fromJson(inputs.extensions) }}
    defaults:
      run:
        working-directory: extensions
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools
      - uses: taiki-e/install-action@cargo-llvm-cov

      - run: make format-rust EXTENSION_PATH=${{ matrix.extension.path }}
      - run: make lint-rust EXTENSION_PATH=${{ matrix.extension.path }}
      - run: make build-rust EXTENSION_PATH=${{ matrix.extension.path }}
      - run: make test-rust-coverage EXTENSION_PATH=${{ matrix.extension.path }}
      
      - uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          disable_search: true
          files: extensions/${{ matrix.extension.path }}/lcov.info
          flags: extensions
