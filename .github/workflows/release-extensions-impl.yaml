name: Release Extensions Implementations

on:
  workflow_call:
    inputs:
      extensions:
        description: |
          JSON array of extensions to release. Each element must have the following fields:
            - name:     extension name as defined in manifest.yaml (e.g. "composer")
            - type:     extension type as defined in manifest.yaml (e.g. "rust", "lua", "go")
            - path:     top-level directory name under extensions/ (e.g. "composer")
          Example:
            [{"name":"composer","type":"go","path":"composer"}]
        required: true
        type: string
      composer_image_name_suffix:
        description: Optional suffix appended to the Composer image name.
        required: false
        default: ''
        type: string
      composer_image_tag:
        description: Optional override for the Composer image tag.
        required: false
        default: ''
        type: string

env:
  OCI_REGISTRY: ghcr.io/tetratelabs

jobs:
  release-extensions:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        extension: ${{ fromJson(inputs.extensions) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64,arm64
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io/tetratelabs
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Rust Extension
        if: matrix.extension.type == 'rust'
        env:
          EXTENSION_PATH: ${{ matrix.extension.path }}
        run: |
          echo "Releasing Rust extension: ${{ matrix.extension.name }}"
          make -C extensions push_rust

      - name: Release Lua Extension
        if: matrix.extension.type == 'lua'
        env:
          EXTENSION_PATH: ${{ matrix.extension.path }}
        run: |
          echo "Releasing Lua extension: ${{ matrix.extension.name }}"
          make -C extensions push_lua

      - name: Release Composer
        if: matrix.extension.name == 'composer'
        env:
          IMAGE_NAME_SUFFIX: ${{ inputs.composer_image_name_suffix }}
          IMAGE_TAG: ${{ inputs.composer_image_tag }}
        run: |
          echo "Releasing Composer extension"
          image_tag="${IMAGE_TAG}"
          if [ -z "${image_tag}" ]; then
            image_tag=$(grep '^version:' extensions/composer/manifest.yaml | sed 's/[^:]*:[[:space:]]*//g' | tr -d '"')
          fi
          make -C extensions/composer push_image IMAGE_NAME_SUFFIX="${IMAGE_NAME_SUFFIX}" IMAGE_TAG="${image_tag}"

      - name: Release Composer Lite
        if: matrix.extension.name == 'composer'
        env:
          COMPOSER_LITE: true
          IMAGE_NAME_SUFFIX: ${{ inputs.composer_image_name_suffix }}
          IMAGE_TAG: ${{ inputs.composer_image_tag }}
        run: |
          image_tag="${IMAGE_TAG}"
          if [ -z "${image_tag}" ]; then
            image_tag=$(grep '^version:' extensions/composer/manifest.yaml | sed 's/[^:]*:[[:space:]]*//g' | tr -d '"')
          fi
          make -C extensions/composer push_image IMAGE_NAME_SUFFIX="${IMAGE_NAME_SUFFIX}" IMAGE_TAG="${image_tag}"

      - name: Push Composer source code
        if: matrix.extension.name == 'composer'
        run: make -C extensions/composer push_code

      - name: Push Composer plugins
        if: matrix.extension.name == 'composer'
        run: make -C extensions/composer push_plugins
