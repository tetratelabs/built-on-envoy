name: Go Extensions

on:
  workflow_call:

env:
  GOPROXY: https://proxy.golang.org

jobs:
  go-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extensions/composer
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: actions/setup-go@v5
        with:
          go-version-file: extensions/composer/go.mod
          cache-dependency-path: extensions/composer/go.sum
      
      - name: Format and lint
        run: make format lint
      
      - name: Build
        run: make build
      
      - name: Build plugins
        run: make build_plugins

      - name: Run tests
        run: make test-coverage
      - uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: extensions

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Run e2e tests
        env:
          TEST_BOE_REGISTRY: ghcr.io/tetratelabs/built-on-envoy
        run: go test -tags e2e -timeout 5m -v ./...
