name: Go Extensions

on:
  workflow_call:

env:
  GOPROXY: https://proxy.golang.org

jobs:
  go-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extensions/composer
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: actions/setup-go@v7
        with:
          go-version-file: extensions/composer/go.mod
          cache-dependency-path: extensions/composer/go.sum

      - run: make format lint
      - run: make build
      - run: make build_plugins
      - run: make test-coverage
      
      - uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          disable_search: true
          files: extensions/composer/out/go-test-coverage.out
          flags: extensions

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Run e2e tests
        env:
          TEST_BOE_REGISTRY: ghcr.io/tetratelabs/built-on-envoy
        run: go test -tags e2e -timeout 5m -v ./...
