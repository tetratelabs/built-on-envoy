name: Go Extensions

on:
  workflow_call:

env:
  GOPROXY: https://proxy.golang.org

jobs:
  composer-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extensions/composer
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: actions/setup-go@v5
        with:
          go-version-file: extensions/composer/go.mod
          cache-dependency-path: extensions/composer/go.sum
      
      - name: Format and lint
        run: make format lint
      
      - name: Build
        run: make build
      
      - name: Build plugins
        run: make build_plugins

      - name: Run tests
        run: make test
