name: Extensions

on:
  push:
    branches:
      - main
      - release-**
  pull_request:
    branches:
      - main
      - release-**

env:
  GOPROXY: https://proxy.golang.org

jobs:
  changes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            extensions:
              - 'extensions/**'
          predicate-quantifier: every  # Make the filters be AND-ed
          token: "" # don't use github api
    outputs:
      extensions: ${{ steps.changes.outputs.extensions }}

  discover:
    needs: changes
    if: ${{ needs.changes.outputs.extensions == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      extensions: ${{ steps.discover.outputs.extensions }}
    steps:
      - uses: actions/checkout@v4
      - name: Discover extensions
        id: discover
        run: |
          # Discover extensions and their languages
          extensions="[]"
          
          for dir in extensions/*/; do
            # Skip if not a directory
            [ -d "$dir" ] || continue
            
            ext_name=$(basename "$dir")
            manifest="$dir/manifest.yaml"
            
            # Skip if no manifest
            [ -f "$manifest" ] || continue
            
            # Read type from manifest
            type=$(grep "^type:" "$manifest" | sed 's/type: *//' | tr -d '\r')
            
            # Detect language
            lang=""
            if [ -f "$dir/Cargo.toml" ]; then
              lang="rust"
            elif [ -f "$dir/go.mod" ]; then
              lang="go"
            elif grep -q "^lua:" "$manifest"; then
              lang="lua"
            fi
            
            echo "Found extension: $ext_name (type=$type, lang=$lang)"
            
            # Add to extensions array
            if [ -n "$lang" ]; then
              extensions=$(echo "$extensions" | jq -c ". + [{\"name\": \"$ext_name\", \"type\": \"$type\", \"language\": \"$lang\", \"path\": \"$ext_name\"}]")
            fi
          done
          
          echo "extensions=$extensions" >> $GITHUB_OUTPUT
          echo "Extensions: $extensions"

  # Rust extensions checks
  rust-fmt:
    needs: discover
    if: ${{ contains(fromJson(needs.discover.outputs.extensions).*.language, 'rust') }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        extension: ${{ fromJson(needs.discover.outputs.extensions) }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --check --manifest-path extensions/${{ matrix.extension.path }}/Cargo.toml

  rust-clippy:
    needs: discover
    if: ${{ contains(fromJson(needs.discover.outputs.extensions).*.language, 'rust') }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        extension: ${{ fromJson(needs.discover.outputs.extensions) }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Run clippy
        run: cargo clippy --manifest-path extensions/${{ matrix.extension.path }}/Cargo.toml -- -D warnings

  rust-build:
    needs: discover
    if: ${{ contains(fromJson(needs.discover.outputs.extensions).*.language, 'rust') }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        extension: ${{ fromJson(needs.discover.outputs.extensions) }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --manifest-path extensions/${{ matrix.extension.path }}/Cargo.toml --release

  rust-test:
    needs: discover
    if: ${{ contains(fromJson(needs.discover.outputs.extensions).*.language, 'rust') }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        extension: ${{ fromJson(needs.discover.outputs.extensions) }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: cargo test --manifest-path extensions/${{ matrix.extension.path }}/Cargo.toml

  # Go extensions checks (composer)
  composer-build:
    needs: discover
    if: ${{ contains(fromJson(needs.discover.outputs.extensions).*.name, 'composer') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: actions/setup-go@v5
        with:
          go-version-file: extensions/composer/go.mod
          cache-dependency-path: extensions/composer/go.sum
      - run: make -C extensions/composer build

  composer-example:
    needs: discover
    if: ${{ contains(fromJson(needs.discover.outputs.extensions).*.name, 'composer') }}
    runs-on: ubuntu-latest
    env:
      EXTENSION_PATH: example-go/standalone
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: actions/setup-go@v5
        with:
          go-version-file: extensions/composer/go.mod
          cache-dependency-path: extensions/composer/go.sum
      - run: make -C extensions/composer build_plugins

  composer-test:
    needs: discover
    if: ${{ contains(fromJson(needs.discover.outputs.extensions).*.name, 'composer') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: extensions/composer/go.mod
          cache-dependency-path: extensions/composer/go.sum
      - run: make -C extensions/composer test

  composer-lint:
    needs: discover
    if: ${{ contains(fromJson(needs.discover.outputs.extensions).*.name, 'composer') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: extensions/composer/go.mod
          cache-dependency-path: extensions/composer/go.sum
      - run: make -C extensions/composer format lint

  # Aggregate all the required jobs and make it easier to customize CI required jobs
  extensions-checks:
    runs-on: ubuntu-latest
    needs:
      - discover
      - rust-fmt
      - rust-clippy
      - rust-build
      - rust-test
      - composer-build
      - composer-example
      - composer-test
      - composer-lint
    # We need this to run always to force-fail (and not skip) if any needed
    # job has failed. Otherwise, a skipped job will not fail the workflow.
    if: always()
    steps:
      - run: |
          echo "Extension checks completed"
          [ "${{
              contains(needs.*.result, 'failure') ||
              contains(needs.*.result, 'cancelled')
            }}" == "false" ] || exit 1
