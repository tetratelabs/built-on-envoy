name: Release Rust Extension Manually

on:
  workflow_dispatch:
    inputs:
      extension:
        description: 'Rust extension name (e.g., ip-restriction)'
        required: true
        type: string
      nonce:
        description: 'Optional nonce to append to the image tag for uniqueness.'
        required: false
        type: string

env:
  OCI_REGISTRY: ghcr.io/tetratelabs

jobs:
  release-rust:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: docker/setup-buildx-action@v3
      
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64,arm64
      
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.OCI_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Rust Extension
        env:
          EXTENSION_PATH: ${{ inputs.extension }}
          IMAGE_NONCE: ${{ inputs.nonce }}
        run: |
          echo "Releasing Rust extension: ${{ inputs.extension }}"
          make -C extensions push_rust
