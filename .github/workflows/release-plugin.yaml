name: Release Composer Plugin

on:
  workflow_dispatch:
    inputs:
      nonce:
        description: 'Optional nonce to append to the image tag for uniqueness.'
        required: false
        type: string
      extension_path:
        description: 'relative path under extensions/, e.g. example-go/standalone.'
        required: true
        type: string

env:
  OCI_REGISTRY: ghcr.io/tetratelabs

jobs:
  release-plugin:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64,arm64
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.OCI_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push Plugin
        run: |
          make -C extensions/internal/libplugin buildx \
            EXTENSION_PATH=${{ inputs.extension_path }} \
            IMAGE_NONCE="${{ inputs.nonce }}"
