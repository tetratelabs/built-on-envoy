name: Release Go Bundle and Plugins Manually

on:
  workflow_dispatch:
    inputs:
      nonce:
        description: 'Optional nonce to append to the image tag for uniqueness.'
        required: false
        type: string

env:
  OCI_REGISTRY: ghcr.io/tetratelabs

jobs:
  release-go-bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64,arm64
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.OCI_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Go Bundle
        env:
          IMAGE_NONCE: ${{ inputs.nonce }}
        run: make -C extensions/go-bundle push_image
      
      - name: Build and Push Lite Go Bundle
        env:
          GOBUNDLE_LITE: true
          IMAGE_NONCE: ${{ inputs.nonce }}
        run: make -C extensions/go-bundle push_image

      - name: Push source code
        env:
          IMAGE_NONCE: ${{ inputs.nonce }}
        run: make -C extensions/go-bundle push_code

      - name: Push all plugins
        env:
          IMAGE_NONCE: ${{ inputs.nonce }}
        run: make -C extensions/go-bundle push_plugins
