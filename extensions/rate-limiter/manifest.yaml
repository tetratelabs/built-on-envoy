name: rate-limiter
version: 1.0.0
categories:
  - Security
  - Performance
author: Tetrate
featured: true
description: Token bucket rate limiting with Redis backend support
longDescription: |
  A robust rate limiting extension that implements the token bucket algorithm.
  Supports both in-memory and Redis backends for distributed rate limiting across
  multiple Envoy instances. Perfect for protecting your APIs from abuse and ensuring
  fair resource allocation.
type: composer
tags:
  - rate-limiting
  - redis
  - protection
  - throttling
license: Apache-2.0
examples:
  - title: Basic rate limiting
    description: Limit requests to 100 per minute
    code: |
      boe run --plugin rate-limiter --config limit=100,window=1m
  - title: Redis backend
    description: Use Redis for distributed rate limiting
    code: |
      boe run --plugin rate-limiter --config backend=redis,redis-url=redis://localhost:6379
