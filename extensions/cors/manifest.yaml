name: cors
version: 1.1.0
categories:
  - Network
author: Tetrate
featured: true
description: Configurable CORS policy with wildcard and regex support
longDescription: |
  A flexible CORS extension that makes it easy to configure cross-origin resource
  sharing policies. Supports wildcards, regex patterns, and per-route configuration.
  Handles preflight requests automatically and provides fine-grained control over
  allowed origins, methods, headers, and credentials.
type: lua

lua:
  path: extension.lua


tags:
  - cors
  - network
  - cross-origin
  - security
license: Apache-2.0
examples:
  - title: Allow all origins
    description: Enable CORS for all origins (development only)
    code: |
      boe run --plugin cors --config allow-origin=*
  - title: Specific origins
    description: Allow specific domains
    code: |
      boe run --plugin cors --config allow-origin=https://app.example.com,https://admin.example.com
