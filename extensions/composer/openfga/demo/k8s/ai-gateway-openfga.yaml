#
# Combined manifest for Envoy AI Gateway + OpenFGA demo.
# Apply after Envoy Gateway and Envoy AI Gateway are installed.
#
# Usage:
#   1. kubectl apply -f ai-gateway-openfga.yaml
#   2. kubectl wait --for=condition=complete job/openfga-setup -n openfga --timeout=60s
#   3. STORE_ID=$(kubectl logs -n openfga -l job-name=openfga-setup | grep "STORE_ID=" | sed 's/.*STORE_ID=//')
#   4. sed "s/YOUR_STORE_ID/$STORE_ID/g" envoy-extension-policy-ai-gateway.yaml | kubectl apply -f -
#
# Or use setup-ai-gateway.sh for full automation.
---
apiVersion: v1
kind: Namespace
metadata:
  name: openfga
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openfga
  namespace: openfga
  labels:
    app: openfga
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openfga
  template:
    metadata:
      labels:
        app: openfga
    spec:
      containers:
        - name: openfga
          image: openfga/openfga:latest
          args: ["run"]
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 8081
              name: grpc
          env:
            - name: OPENFGA_DATASTORE_ENGINE
              value: "memory"
            - name: OPENFGA_HTTP_ADDR
              value: "0.0.0.0:8080"
            - name: OPENFGA_GRPC_ADDR
              value: "0.0.0.0:8081"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: openfga
  namespace: openfga
  labels:
    app: openfga
spec:
  selector:
    app: openfga
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: grpc
      port: 8081
      targetPort: grpc
  type: ClusterIP
---
apiVersion: batch/v1
kind: Job
metadata:
  name: openfga-setup
  namespace: openfga
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: setup
          image: curlimages/curl:latest
          env:
            - name: OPENFGA_URL
              value: "http://openfga.openfga.svc.cluster.local:8080"
          command:
            - /bin/sh
            - -c
            - |
              set -e

              echo "=== Waiting for OpenFGA to be ready ==="
              for i in $(seq 1 30); do
                if curl -sf "$OPENFGA_URL/healthz" > /dev/null 2>&1; then
                  echo "OpenFGA is ready"
                  break
                fi
                echo "Waiting for OpenFGA... ($i/30)"
                sleep 2
              done
              if ! curl -sf "$OPENFGA_URL/healthz" > /dev/null 2>&1; then
                echo "ERROR: OpenFGA is not ready after 60s"
                exit 1
              fi

              echo "=== Creating store ==="
              STORE_RESP=$(curl -sf -X POST "$OPENFGA_URL/stores" \
                -H "Content-Type: application/json" \
                -d '{"name":"demo"}')
              STORE_ID=$(echo "$STORE_RESP" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
              echo "Store ID: $STORE_ID"

              echo "=== Creating authorization model ==="
              MODEL_RESP=$(curl -sf -X POST "$OPENFGA_URL/stores/$STORE_ID/authorization-models" \
                -H "Content-Type: application/json" \
                -d '{
                  "schema_version": "1.1",
                  "type_definitions": [
                    {"type": "user", "relations": {}, "metadata": {"relations": {}}},
                    {
                      "type": "model",
                      "relations": {
                        "can_use": {
                          "this": {},
                          "union": {"child": [{"this": {}}]}
                        }
                      },
                      "metadata": {
                        "relations": {
                          "can_use": {"directly_related_user_types": [{"type": "user"}]}
                        }
                      }
                    },
                    {
                      "type": "tool",
                      "relations": {
                        "can_invoke": {
                          "this": {},
                          "union": {"child": [{"this": {}}]}
                        }
                      },
                      "metadata": {
                        "relations": {
                          "can_invoke": {"directly_related_user_types": [{"type": "user"}]}
                        }
                      }
                    },
                    {
                      "type": "resource",
                      "relations": {
                        "can_access": {
                          "this": {},
                          "union": {"child": [{"this": {}}]}
                        }
                      },
                      "metadata": {
                        "relations": {
                          "can_access": {"directly_related_user_types": [{"type": "user"}]}
                        }
                      }
                    }
                  ]
                }')
              MODEL_ID=$(echo "$MODEL_RESP" | grep -o '"authorization_model_id":"[^"]*"' | cut -d'"' -f4)
              echo "Authorization Model ID: $MODEL_ID"

              echo "=== Writing tuples (alice gets access to models, bob gets nothing) ==="
              curl -sf -X POST "$OPENFGA_URL/stores/$STORE_ID/write" \
                -H "Content-Type: application/json" \
                -d "{
                  \"writes\": {
                    \"tuple_keys\": [
                      {\"user\": \"user:alice\", \"relation\": \"can_use\",    \"object\": \"model:gpt-4\"},
                      {\"user\": \"user:alice\", \"relation\": \"can_use\",    \"object\": \"model:some-cool-self-hosted-model\"},
                      {\"user\": \"user:alice\", \"relation\": \"can_invoke\",  \"object\": \"tool:github__issue_read\"},
                      {\"user\": \"user:alice\", \"relation\": \"can_access\",  \"object\": \"resource:planning\"}
                    ]
                  },
                  \"authorization_model_id\": \"$MODEL_ID\"
                }"

              echo ""
              echo "=== Setup complete ==="
              echo "STORE_ID=$STORE_ID"
              echo "MODEL_ID=$MODEL_ID"
