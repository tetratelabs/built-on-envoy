name: oauth2te
parent: composer
categories:
  - Security
author: Tetrate
featured: true
description: OAuth2 token exchange for Envoy HTTP traffic
longDescription: |
  An OAuth 2.0 Token Exchange (RFC 8693) HTTP filter for Envoy Proxy. It intercepts
  incoming requests and exchanges the bearer token for a new one connecting to an external
  Security Token Service (STS) before forwarding the request upstream.

  ## Features

  * **RFC 8693 Compliant**: Token exchange implementation with all optional parameters.
  * **Impersonation & Delegation**: Supports both semantics — omit `actor_token` for impersonation,
    include it for delegation.
  * **RFC Error Parsing**: Parses and logs error descriptions optionally returned by the STS. 

  ## How It Works

  The filter intercepts incoming HTTP requests, extracts the Bearer token from the
  incoming Authorization header and sends a HTTP callout to the configured STS endpoint.
  The gateway authenticates via HTTP Basic auth using the configured client credentials and
  exchanges the incoming token for a new one. On success, the original Authorization header is
  replaced with the exchanged token before the request continues upstream.

  ## Configuration

  Required fields:
  - `cluster`: Envoy cluster name that routes to the STS endpoint
  - `token_exchange_endpoint`: Path of the token exchange endpoint (e.g. "/oauth2/token")
  - `token_exchange_host`: Host of the STS endpoint
  - `client_id`: Client identifier for HTTP Basic authentication with the STS
  - `client_secret`: Client secret for HTTP Basic authentication with the STS

  Optional fields:
  - `audience`: Logical name of the target service for the exchanged token
  - `resource`: Absolute URI of the target resource (must not contain a fragment)
  - `scope`: Space-delimited scope list for the requested token
  - `requested_token_type`: Desired output token type URI
  - `actor_token` / `actor_token_type`: For delegation semantics (both required together)
  - `subject_token_type`: Input token type (defaults to `urn:ietf:params:oauth:token-type:access_token`)
  - `timeout_ms`: HTTP callout timeout in milliseconds (defaults to `5000`)

  ## Metrics

  The extension emits the following Envoy counters:

  | Metric | Type | Tags | Description |
  |--------|------|------|-------------|
  | `oauth2te_token_exchanges_total` | Counter | — | Incremented on each token exchange callout initiated |
  | `oauth2te_token_exchange_results_total` | Counter | `result` (`success` / `rejected` / `error`) | Incremented after the STS response is processed |
