name: saml
parent: composer
categories:
  - Security
author: Tetrate
featured: true
description: SAML 2.0 Service Provider authentication for Envoy HTTP traffic
longDescription: |
  A SAML 2.0 Service Provider (SP) HTTP filter that adds browser-based single sign-on
  authentication to any service behind Envoy Proxy.

  ## Features

  * **SP-Initiated SSO**: Redirects unauthenticated users to your Identity Provider
  * **Assertion Validation**: Full SAML Response signature verification and condition checks
  * **Session Management**: HMAC-signed cookies with configurable expiration
  * **Attribute Forwarding**: Maps SAML attributes to upstream request headers
  * **SP Metadata Endpoint**: Auto-generated metadata XML for easy IdP registration
  * **Signed AuthnRequests**: Optional RSA-SHA256 signing of outbound authentication requests
  * **Auto-Generated SP Certificates**: Ephemeral keypair generated when no certificate is provided

  ## How It Works

  The filter intercepts incoming HTTP requests and checks for a valid session cookie.
  If no session exists, the browser is redirected to the configured IdP with a SAML
  AuthnRequest. After authentication, the IdP POSTs a SAMLResponse to the Assertion
  Consumer Service (ACS) endpoint. The filter validates the assertion, creates a signed
  session cookie, and redirects the user to their original URL. Subsequent requests
  include the session cookie and pass through with identity headers set.

  ## Configuration

  Required fields:
  - `entity_id`: The SP entity ID (usually, audience URI)
  - `acs_path`: Path for the Assertion Consumer Service endpoint
  - `idp_metadata_xml`: IdP metadata XML, as `{"inline": "<xml>..."}` or `{"file": "/path/to/metadata.xml"}`

  Optional fields:
  - `sp_cert_pem` / `sp_key_pem`: PEM-encoded SP certificate and private key, each as
    `{"inline": "..."}` or `{"file": "/path/to/file.pem"}`. If both are omitted, an ephemeral
    self-signed keypair is auto-generated — convenient for development or when the IdP does
    not require a pre-registered SP certificate. If provided, both must be set together.
  - Session settings: `session.duration`, `session.cookie_name`, `session.cookie_secure`,
    `session.cookie_domain`, `session.cookie_signing_key`
  - `bypass_paths`, `attribute_headers`, `sign_authn_requests`, `default_redirect_path`

  ## Metrics

  The extension emits the following Envoy counters:

  | Metric | Type | Tags | Description |
  |--------|------|------|-------------|
  | `saml_authn_requests_total` | Counter | - | Incremented on each IdP redirect |
  | `saml_assertions_validated_total` | Counter | `result` (`success` / `failure`) | Incremented after SAML response validation |
  | `saml_sessions_created_total` | Counter | - | Incremented on successful ACS processing |
  | `saml_sessions_validated_total` | Counter | `result` (`valid` / `expired` / `invalid`) | Incremented on session cookie validation |
type: go
tags:
