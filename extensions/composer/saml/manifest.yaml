examples:
  - title: Basic SAML SSO
    description: |
      Minimal setup - only the IdP metadata is needed. An ephemeral SP certificate
      and key are auto-generated.
    code: |
      # Start keycloack
      curl -o docker-compose.yaml https://raw.githubusercontent.com/tetratelabs/built-on-envoy/refs/heads/main/extensions/composer/saml/demo/keycloak/docker-compose-remote.yaml
      docker compose -f docker-compose.yaml up --wait

      # Download the IdP metadata
      curl http://localhost:8080/realms/saml-demo/protocol/saml/descriptor -o idp-metadata.xml

      # Run the plugin
      boe run --extension saml --config '
        {
          "entity_id": "http://localhost:10000",
          "acs_path": "/saml/acs",
          "idp_metadata_xml": {"file": "idp-metadata.xml"}
        }'

      # Test the plugin in the browser and login as testuser/testpass
      open http://localhost:10000

      # Cleanup keycloak
      docker compose -f docker-compose.yaml down -v
  - title: Explicit SP Certificate
    description: |
      Provide your own SP certificate and key for production deployments where the
      IdP requires a pre-registered SP certificate.
    code: |
      # Start keycloack
      curl -o docker-compose.yaml https://raw.githubusercontent.com/tetratelabs/built-on-envoy/refs/heads/main/extensions/composer/saml/demo/keycloak/docker-compose-remote.yaml
      docker compose -f docker-compose.yaml up --wait

      # Download the IdP metadata
      curl http://localhost:8080/realms/saml-demo/protocol/saml/descriptor -o idp-metadata.xml

      # Run the plugin
      boe run --extension saml --config '
        {
          "entity_id": "http://localhost:10000",
          "acs_path": "/saml/acs",
          "idp_metadata_xml": {"file": "idp-metadata.xml"},
          "sp_cert_pem": {"file": "sp-cert.pem"},
          "sp_key_pem": {"file": "sp-key.pem"}
        }'

      # Test the plugin in the browser and login as testuser/testpass
      open http://localhost:10000

      # Cleanup keycloak
      docker compose -f docker-compose.yaml down -v
  - title: Custom Session Settings
    description: |
      Configure session cookie name, duration, domain, security, and a fixed
      HMAC signing key (64 hex chars = 32 bytes) for cookie persistence across restarts.
    code: |
      # Start keycloack
      curl -o docker-compose.yaml https://raw.githubusercontent.com/tetratelabs/built-on-envoy/refs/heads/main/extensions/composer/saml/demo/keycloak/docker-compose-remote.yaml
      docker compose -f docker-compose.yaml up --wait

      # Download the IdP metadata
      curl http://localhost:8080/realms/saml-demo/protocol/saml/descriptor -o idp-metadata.xml

      # Run the plugin
      boe run --extension saml --config '
        {
          "entity_id": "http://localhost:10000",
          "acs_path": "/saml/acs",
          "idp_metadata_xml": {"file": "idp-metadata.xml"},
          "session": {
            "cookie_name": "my_session",
            "duration": "5m",
            "cookie_domain": ".example.com",
            "cookie_secure": true,
            "cookie_signing_key": "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
          }
        }'

      # Test the plugin in the browser and login as testuser/testpass
      # Check the cookie with browser dev tools to see how the settings applied
      open http://localhost:10000

      # Cleanup keycloak
      docker compose -f docker-compose.yaml down -v
  - title: Attribute Mapping and Bypass Paths
    description: |
      Map SAML attributes to upstream headers and bypass health check paths
      from authentication.
    code: |
      # Start keycloack
      curl -o docker-compose.yaml https://raw.githubusercontent.com/tetratelabs/built-on-envoy/refs/heads/main/extensions/composer/saml/demo/keycloak/docker-compose-remote.yaml
      docker compose -f docker-compose.yaml up --wait

      # Download the IdP metadata
      curl http://localhost:8080/realms/saml-demo/protocol/saml/descriptor -o idp-metadata.xml

      # Run the plugin
      boe run --extension saml --config '
        {
          "entity_id": "http://localhost:10000",
          "acs_path": "/saml/acs",
          "idp_metadata_xml": {"file": "idp-metadata.xml"},
          "attribute_headers": {
            "email": "x-saml-email",
            "Role": "x-saml-role"
          },
          "bypass_paths": ["/health", "/ready", "/status/409"],
        }'

      # Test the plugin in the browser and login as testuser/testpass and check how the headers are set
      open http://localhost:10000/headers

      # Clear the session cookies and then open again the browser and check how authentication is bypassed
      open http://localhost:10000/status/409

      # Cleanup keycloak
      docker compose -f docker-compose.yaml down -v
