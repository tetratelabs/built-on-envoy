name: jwe-decrypt
parent: composer
categories:
  - Security
author: Tetrate
description: Decrypt JWE tokens and recover the inner JWT for Envoy to process
longDescription: |
  This extension implements [JSON Web Encryption (JWE)](https://datatracker.ietf.org/doc/html/rfc7516)
  decryption in a Go extension for Envoy. JWE is a standard defined in
  [RFC 7516](https://datatracker.ietf.org/doc/html/rfc7516) that provides encrypted content
  using JSON-based data structures, built on top of the
  [JSON Web Algorithms (JWA)](https://datatracker.ietf.org/doc/html/rfc7518) and
  [JSON Web Key (JWK)](https://datatracker.ietf.org/doc/html/rfc7517) specifications.

  **JWT inside JWE** &mdash; For clients that encrypt a [JWT (RFC 7519)](https://datatracker.ietf.org/doc/html/rfc7519)
  into a JWE token before sending it to the server, this extension decrypts the JWE and recovers the original
  JWT so that Envoy's built-in
  [JWT Authentication filter](https://www.envoyproxy.io/docs/envoy/latest/configuration/http/http_filters/jwt_authn_filter)
  can read it, extract the token claims and use them for authorization.
type: composer
featured: true
tags:
  - go
  - http
  - filter
  - jwe
  - security
  - encryption
license: Apache-2.0
examples:
  - title: Decrypt and forward a Bearer token
    description: |
      Process a request with the `Authorization: Bearer <JWE compact token>` header,
      decrypt the JWE token, and emit the decrypted payload back into the `Authorization`
      header with the `Bearer` prefix restored.
    code: |
      boe run --extension jwe-decrypt --config '{
        "key_file": "/path/to/private-key.pem",
        "input_header": "Authorization",
        "prefix": "Bearer ",
        "output_header": "Authorization"
      }'
  - title: Using inline key
    description: |
      To enable the JWE decryption extension to decrypt JWE tokens you will need to provide the private key
      that will be used to decrypt the JWE tokens. You can provide the key inline with the config by base64 encoding
      the PEM PKCS8 private key.
      You will also need to specify the header that contains the JWE token, and the header or metadata key where
      the decrypted payload should be stored.
    code: |
      boe run --extension jwe-decrypt --config '{
        "inline_key": "LS0tLS1CRUdJTiBSU0EgUFJJVkFURSBLRVktLS0tLQo...base64-encoded-key..."
        "input_header": "X-JWE-Token",
        "output_header": "X-Decrypted-JWE-Token",
      }'
  - title: Using key file
    description: |
      You can provide the key file path in the config. The extension will read the file and use the key to decrypt
      the JWE tokens. The key file should contain the PEM PKCS8 private key.
      You will also need to specify the header that contains the JWE token, and the header or metadata key where
      the decrypted payload should be stored.
    code: |
      boe run --extension jwe-decrypt --config '{
        "key_file": "/path/to/private-key.pem",
        "input_header": "X-JWE-Token",
        "output_header": "X-Decrypted-JWE-Token",
      }'
  - title: Add decrypted payload to metadata
    description: |
      Specify the output_metadata field in the config to add the decrypted payload to Envoy metadata instead of a
      header. The value of output_metadata should be the key where the decrypted payload will be stored in the
      metadata under the `jwe-decrypt` namespace.
    code: |
      boe run --extension jwe-decrypt --config '{
        "inline_key": "LS0tLS1CRUdJTiBSU0EgUFJJVkFURSBLRVktLS0tLQo...base64-encoded-key..."
        "input_header": "X-JWE-Token",
        "output_metadata": "jwe_decrypted_payload",
      }'
