      You can then run the JWE decryption extension in Envoy to decrypt the JWE token and recover the original JWT token. You will need
      to run Envoy providing the necessary configuration, for instance:

      ```cmd
      boe run --extension jwe-decrypt --config '{
        "key_file": "/path/to/private-key.pem",
        "input_header": "authorization",
        "prefix": "Bearer ",
        "output_header": "authorization"
      }'
      ```

      In this case, the extension will look for the JWE token in the `Authorization` header, decrypt it using the private key, and emit
      the decrypted JWT token back into the `Authorization` header with the `Bearer` prefix restored. Envoy's JWT Authentication filter
      can then read the decrypted JWT token from the `Authorization` header and process it as usual.

