name: jwe-decrypt
parent: composer
categories:
  - Security
author: Tetrate
description: Decrypt JWE tokens and recover the inner JWT for Envoy to process
longDescription: |
  This extension implements [JSON Web Encryption (JWE)](https://datatracker.ietf.org/doc/html/rfc7516)
  decryption in a Go extension for Envoy. JWE is a standard defined in
  [RFC 7516](https://datatracker.ietf.org/doc/html/rfc7516) that provides encrypted content
  using JSON-based data structures, built on top of the
  [JSON Web Algorithms (JWA)](https://datatracker.ietf.org/doc/html/rfc7518) and
  [JSON Web Key (JWK)](https://datatracker.ietf.org/doc/html/rfc7517) specifications.

  **JWT inside JWE** &mdash; For clients that encrypt a [JWT (RFC 7519)](https://datatracker.ietf.org/doc/html/rfc7519)
  into a JWE token before sending it to the server, this extension decrypts the JWE and recovers the original
  JWT so that Envoy's built-in
  [JWT Authentication filter](https://www.envoyproxy.io/docs/envoy/latest/configuration/http/http_filters/jwt_authn_filter)
  can read it, extract the token claims and use them for authorization.
type: composer
featured: true
tags:
  - go
  - http
  - filter
  - jwe
  - security
  - encryption
license: Apache-2.0
examples:
  - title: Quickstart
    description: |
      In this example, we will generate a JWE token containing a JWT token as the payload, and then use the JWE decryption extension
      in Envoy to decrypt the JWE token and recover the original JWT token.
    code: |
      In order to decrypt JWE tokens, you will need to provide the private key that matches the public key used for encryption. You
      can generate a key pair using OpenSSL with the following command:

      ```cmd
      openssl genpkey -algorithm RSA -out private-key.pem -pkeyopt rsa_keygen_bits:2048
      openssl rsa -pubout -in private-key.pem -out public-key.pem
      ```

      If you need a test JWT token, you can use free services like [jwt.io](https://jwt.io/) to create a sample JWT token, or run some
      small code, for example, in Golang:

      ```go
      package main

      import (
        "crypto/rsa"
        "crypto/x509"
        "encoding/pem"
        "flag"
        "fmt"
        "log"
        "os"
        "time"

        "github.com/lestrrat-go/jwx/v3/jwa"
        "github.com/lestrrat-go/jwx/v3/jwe"
        "github.com/lestrrat-go/jwx/v3/jwk"
        "github.com/lestrrat-go/jwx/v3/jwt"
      )

      func main() {
        var (
          privKeyFile   string
          publicKeyFile string
        )

        flag.StringVar(&privKeyFile, "privkey", "", "path to private key file")
        flag.StringVar(&publicKeyFile, "pubkey", "", "path to public key file")
        flag.Parse()

        if privKeyFile == "" || publicKeyFile == "" {
          log.Fatalf("missing required -privkey or -pubkey argument\n")
        }

        // Parse the private key
        b, err := os.ReadFile(privKeyFile)
        if err != nil {
          log.Fatalf("failed to read key file: %s\n", err)
        }
        privPemBlock, _ := pem.Decode(b)
        if privPemBlock == nil {
          log.Fatalf("failed to parse PEM block containing the key")
        }
        parsedKey, err := x509.ParsePKCS8PrivateKey(privPemBlock.Bytes)
        if err != nil {
          log.Fatalf("failed to parse PKCS8 private key: %s", err)
        }
        privateKey, ok := parsedKey.(*rsa.PrivateKey)
        if !ok {
          log.Fatalf("unable to parse RSA private key")
        }
        priv, err := jwk.Import(privateKey)
        if err != nil {
          log.Fatalf("failed to import private key: %s", err)
        }

        // Generate a new JWT token
        t := jwt.New()
        t.Set(jwt.SubjectKey, `SampleJWT`)
        t.Set(jwt.AudienceKey, `BoE Users`)
        t.Set(jwt.IssuedAtKey, time.Unix(time.Now().Unix(), 0))
        t.Set(`privateClaimKey`, `Hello, World!`)

        // Sign the token with the private key
        signed, err := jwt.Sign(t, jwt.WithKey(jwa.RS256(), priv))
        if err != nil {
          log.Printf("failed to sign token: %s", err)
          return
        }

        fmt.Printf("Signed JWT token:\n%s\n", signed)

        // Parse the public key
        b, err = os.ReadFile(publicKeyFile)
        if err != nil {
          log.Fatalf("failed to read key file: %s\n", err)
        }
        pubPemBlock, _ := pem.Decode(b)
        if pubPemBlock == nil {
          log.Fatalf("failed to parse PEM block containing the key")
        }
        pub, err := x509.ParsePKIXPublicKey(pubPemBlock.Bytes)
        if err != nil {
          log.Fatalf("failed to parse PKIX public key: %s", err)
        }
        publicKey, ok := pub.(*rsa.PublicKey)
        if !ok {
          log.Fatalf("unable to parse RSA public key")
        }
        pubJWK, err := jwk.Import(publicKey)
        if err != nil {
          log.Fatalf("failed to import public key: %s", err)
        }

        // Encrypt the token with the public key
        encrypted, err := jwe.Encrypt(signed, jwe.WithKey(jwa.RSA_OAEP(), pubJWK))
        if err != nil {
          log.Printf("failed to encrypt token: %s", err)
          return
        }

        fmt.Printf("Encrypted JWT token:\n%s\n", encrypted)
      }
      ```

      You can save the snippet above in a `main.go` file then run it:

      ```cmd
      go run main.go -key /path/to/private-key.pem
      ```

      This will print a sample JWT token signed with the private key, and the encrypted JWE token.

