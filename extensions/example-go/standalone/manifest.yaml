name: example-go
version: 0.2.1
categories:
  - Examples
author: Tetrate
featured: true
description: Example go plugin for HTTP filters, loaded at runtime by the composer dynamic module.
longDescription: |
  An example HTTP filter plugin written in Go that demonstrates how to build extensions
  using the Composer Dynamic Module system.

  ## Features

  This plugin showcases common HTTP filter operations:

  - **Header manipulation**: Read, add, and modify request/response headers
  - **Body modification**: Intercept and rewrite request/response bodies
  - **Metadata access**: Store and retrieve dynamic metadata and request attributes
  - **Metrics**: Work with Envoy counters, gauges, and histograms
  - **Local replies**: Send custom responses directly from the filter

  ## Packaging

  This is the **standalone** version of the plugin, compiled as a separate `.so` file
  that can be loaded by the Composer at runtime. This allows plugins to be updated
  independently, but requires careful version management to ensure the plugin is built
  with the same Go runtime and dependency versions as the Composer module.
type: composer

# The composer version must match the version of the composer dynamic module
# that will load this plugin to ensure compatibility.
composerVersion: 0.2.1

tags:
  - go
  - http
  - filter
license: Apache-2.0
examples:
  - title: Basic example go plugin
    description: Load the example go plugin as an HTTP filter
    code: |
      boe run --extension example-go
