name: example-go
parent: gobundle
categories:
  - Examples
author: Tetrate
description: Example Go Bundle embedded go plugin for HTTP filters
longDescription: |
  An example HTTP filter plugin written in Go that demonstrates how to build extensions
  using the Go Bundle Dynamic Module system.

  ## Features

  This plugin showcases common HTTP filter operations:

  - **Header manipulation**: Read, add, and modify request/response headers
  - **Body modification**: Intercept and rewrite request/response bodies
  - **Metadata access**: Store and retrieve dynamic metadata and request attributes
  - **Metrics**: Work with Envoy counters, gauges, and histograms
  - **Local replies**: Send custom responses directly from the filter

  ## Packaging

  This is the **embedded** version of the plugin, compiled directly into the Go Bundle
  dynamic module binary. This approach guarantees Go runtime compatibility since the
  plugin and host are built together with the same toolchain and dependencies.
type: go_bundle
tags:
  - go
  - http
  - filter
license: Apache-2.0
examples:
  - title: Basic Example
    description: Load the example go plugin as an HTTP filter
    code: |
      boe run --extension example
