examples:
  - title: Resolve virtual IPs to filter state
    description: |
      The `dns-gateway-lookup` network filter requires no configuration. Pair it with the
      `dns-gateway-resolver` UDP listener filter, which allocates the virtual IPs and populates
      the shared cache this filter reads from.
    code: |
      boe run \
        --extension dns-gateway-resolver --config '
          {
            "domains": [
              {
                "domain": "*.aws.com",
                "base_ip": "10.0.0.0",
                "prefix_len": 24,
                "metadata": {
                  "cluster": "aws_cluster"
                }
              }
            ]
          }' \
        --extension dns-gateway-lookup
  - title: Custom filter state prefix
    description: |
      Override the default `io.builtonenvoy.dns_gateway` prefix used for the filter state keys
      written by this filter.
    code: |
      boe run \
        --extension dns-gateway-resolver --config '
          {
            "domains": [
              { "domain": "*.aws.com", "base_ip": "10.0.0.0", "prefix_len": 24 }
            ]
          }' \
        --extension dns-gateway-lookup --config '{"filter_state_prefix": "egress.dns"}'
