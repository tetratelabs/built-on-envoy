name: dns-gateway-lookup
parent: dns-gateway
categories:
  - Network
  - Security
author: Palantir Technologies
featured: true
description: Resolve virtual IPs back to domain and metadata as filter state
longDescription: |
  The network filter half of the [dns-gateway](dns-gateway) extension set. When an application
  opens a TCP connection to a virtual IP previously allocated by the
  [dns-gateway-resolver](dns-gateway-resolver) UDP listener filter, this filter looks up the
  original domain and its configured metadata from the shared, process-wide cache and sets them
  as Envoy
  [filter state](https://www.envoyproxy.io/docs/envoy/latest/intro/arch_overview/advanced/data_sharing_between_filters#primitives).

  Downstream filters (e.g. `tcp_proxy`, `set_filter_state`) can then use this to select the
  upstream cluster, set headers, or apply policy. Both filters ship in the same `dns-gateway`
  dynamic module, so the cache is shared in-process.

  > Backward compatibility: this filter is also reachable under the legacy name
  > `dns-gateway` via `--extension dns-gateway --filter-type network`.

  ## Configuration

  | Field | Type | Required | Description |
  |-------|------|----------|-------------|
  | `filter_state_prefix` | string | no | Prefix for filter state keys. Default: `io.builtonenvoy.dns_gateway` |

  ## Filter State

  This filter writes the following keys to Envoy filter state, readable by downstream filters
  via `%FILTER_STATE(<key>:PLAIN)%`:

  | Key | Example | Description |
  |-----|---------|-------------|
  | `<prefix>.domain` | `bucket-1.aws.com` | The matched domain from the DNS query |
  | `<prefix>.metadata.<key>` | `aws_cluster` | Per-domain metadata values from config |

  The default prefix is `io.builtonenvoy.dns_gateway`.

  ## Prerequisites

  Requires iptables/nftables rules to redirect outbound connections to virtual IP ranges to
  Envoy's TCP listener.
