<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Gradient for the hexagon border -->
    <linearGradient id="hexGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d14a9b"/>
      <stop offset="100%" style="stop-color:#a53795"/>
    </linearGradient>

    <!-- Blue-purple gradient for the icon -->
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6b4a9b"/>
      <stop offset="100%" style="stop-color:#4a3080"/>
    </linearGradient>

    <!-- Lighter purple -->
    <linearGradient id="iconGradientLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b6abb"/>
      <stop offset="100%" style="stop-color:#6a50a0"/>
    </linearGradient>
  </defs>

  <!-- Transparent hexagon fill -->
  <polygon
    points="100,15 172,52 172,148 100,185 28,148 28,52"
    fill="transparent"
  />

  <!-- Pink hexagon border - thicker -->
  <polygon
    points="100,15 172,52 172,148 100,185 28,148 28,52"
    fill="none"
    stroke="url(#hexGradient)"
    stroke-width="12"
  />

  <!-- Code window with brackets - scaled down -->
  <g transform="translate(100, 100) scale(0.85)">

    <!-- Window/terminal background -->
    <rect x="-50" y="-45" width="100" height="90" rx="8" fill="url(#iconGradient)"/>

    <!-- Window title bar -->
    <rect x="-50" y="-45" width="100" height="18" rx="8" fill="url(#iconGradientLight)"/>
    <rect x="-50" y="-35" width="100" height="8" fill="url(#iconGradientLight)"/>

    <!-- Window buttons -->
    <circle cx="-38" cy="-36" r="4" fill="#ffffff" opacity="0.7"/>
    <circle cx="-26" cy="-36" r="4" fill="#ffffff" opacity="0.5"/>
    <circle cx="-14" cy="-36" r="4" fill="#ffffff" opacity="0.3"/>

    <!-- Code lines inside -->
    <g fill="#ffffff">
      <!-- Left bracket < -->
      <path
        d="M-8,-15 L-25,0 L-8,15"
        fill="none"
        stroke="#ffffff"
        stroke-width="6"
        stroke-linecap="round"
        stroke-linejoin="round"
      />

      <!-- Right bracket > -->
      <path
        d="M8,-15 L25,0 L8,15"
        fill="none"
        stroke="#ffffff"
        stroke-width="6"
        stroke-linecap="round"
        stroke-linejoin="round"
      />

      <!-- Slash in middle -->
      <line x1="5" y1="-12" x2="-5" y2="12" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.8"/>
    </g>

  </g>
</svg>
