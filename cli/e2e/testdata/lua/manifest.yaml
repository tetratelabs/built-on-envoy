name: test-lua
version: 1.0.0
categories:
  - Test
author: Tetrate
featured: false
description: e2e lua test
longDescription: |
  Adds a response header for the lua e2e tests
tags:
  - test
license: Apache-2.0
type: lua
lua:
  inline: |
    function envoy_on_request(request_handle)
      request_handle:logInfo("lua-e2e-test: received request")
    end

    function envoy_on_response(response_handle)
      response_handle:headers():add("x-e2e-lua", "lua-e2e-test")
    end
examples:
  - title: Test Lua Extension
    description: Enable the lua test extension
    code: |
      boe run --extension test-lua
