name: e2e-lua-with-mcp
version: 1.0.0
minEnvoyVersion: 1.38.0
categories:
  - Security
author: Built On Envoy
description: Lua that reads MCP metadata published by the native MCP filter
longDescription: |
  Used by the e2e suite to verify that envoy.filters.http.mcp can be
  declared in nativeHttpFilters.before so its dynamic metadata is
  visible to a later BOE extension.
type: lua
lua:
  inline: |
    -- Read MCP-populated dynamic metadata and surface it on the response
    -- so the e2e test can assert from the client side. The MCP filter
    -- writes either to `envoy.filters.http.mcp` (default at v1.38.0) or
    -- to `mcp_proxy` (legacy fallback when the namespace runtime flag is
    -- disabled), so we try both.
    function envoy_on_response(response_handle)
      local md = response_handle:streamInfo():dynamicMetadata()
      local entry = md:get("envoy.filters.http.mcp")
      if entry == nil then
        entry = md:get("mcp_proxy")
      end
      if entry ~= nil then
        local headers = response_handle:headers()
        if entry.method ~= nil then
          headers:add("x-mcp-method", tostring(entry.method))
        end
        if entry.is_mcp_request ~= nil then
          headers:add("x-mcp-is-mcp-request", tostring(entry.is_mcp_request))
        end
      end
    end
tags:
  - test
license: Apache-2.0
examples:
  - title: Run with MCP
    description: Start Envoy with MCP in front of this Lua extension
    code: |
      boe run --local cli/e2e/testdata/lua_with_mcp
nativeHttpFilters:
  before:
    - name: envoy.filters.http.mcp
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.filters.http.mcp.v3.Mcp
        traffic_mode: REJECT_NO_MCP
        request_storage_mode: DYNAMIC_METADATA_AND_FILTER_STATE
