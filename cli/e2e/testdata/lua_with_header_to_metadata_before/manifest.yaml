name: e2e-lua-with-header-to-metadata-before
version: 1.0.0
minEnvoyVersion: 1.38.0
categories:
  - Security
author: Built On Envoy
description: Enrich requests using tenant metadata classified by a native filter before Lua
longDescription: |
  header_to_metadata extracts x-tenant-id into metadata and strips the header.
  Lua reads the metadata to set a tenant tier for upstream.
type: lua
lua:
  inline: |
    function envoy_on_request(request_handle)
      local md = request_handle:streamInfo():dynamicMetadata():get("boe.tenant")
      if md ~= nil and md.id ~= nil then
        local tenant = tostring(md.id)
        local tier = "standard"
        if tenant == "acme" then tier = "premium" end
        request_handle:headers():add("x-tenant-tier", tier)
        request_handle:headers():add("x-tenant-source", "metadata")
      end
    end

    function envoy_on_response(response_handle)
      local md = response_handle:streamInfo():dynamicMetadata():get("boe.tenant")
      if md ~= nil and md.id ~= nil then
        response_handle:headers():add("x-tenant-from-metadata", tostring(md.id))
      end
    end
tags:
  - test
license: Apache-2.0
examples:
  - title: Classify tenant before Lua enrichment
    description: header_to_metadata extracts tenant into metadata; Lua reads it to set tier
    code: |
      boe run --local cli/e2e/testdata/lua_with_header_to_metadata_before
nativeHttpFilters:
  before:
    - name: envoy.filters.http.header_to_metadata
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.filters.http.header_to_metadata.v3.Config
        request_rules:
          - header: x-tenant-id
            on_header_present:
              metadata_namespace: boe.tenant
              key: id
            remove: true
