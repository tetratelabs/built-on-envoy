admin:
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 9901
static_resources:
  clusters:
  - dns_lookup_family: V4_ONLY
    load_assignment:
      cluster_name: test-upstream
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: httpbin.org
                port_value: 443
    name: test-upstream
    transport_socket:
      name: envoy.transport_sockets.tls
      typed_config:
        '@type': type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
        sni: httpbin.org
    type: STRICT_DNS
  listeners:
  - address:
      socket_address:
        address: 0.0.0.0
        port_value: 10000
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          '@type': type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          access_log:
          - name: envoy.access_loggers.stdout
            typed_config:
              '@type': type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
          http_filters:
          - name: test-lua-with-header-to-metadata-after
            typed_config:
              '@type': type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
              default_source_code:
                inline_string: |
                  local function tenant_from_metadata(handle)
                    local entry = handle:streamInfo():dynamicMetadata():get("boe.e2e")
                    if entry ~= nil and entry.tenant ~= nil then
                      return tostring(entry.tenant)
                    end
                    return nil
                  end

                  function envoy_on_request(request_handle)
                    local headers = request_handle:headers()
                    local request_tenant = headers:get("x-tenant-id")
                    if request_tenant ~= nil then
                      headers:add("x-boe-lua-request-tenant", request_tenant)
                    end

                    local tenant = request_tenant or "anonymous"
                    headers:add("x-boe-selected-tenant", tenant)
                    headers:add("x-boe-tenant-metadata", tenant)
                    headers:remove("x-tenant-id")
                  end

                  function envoy_on_response(response_handle)
                    local tenant = tenant_from_metadata(response_handle)
                    if tenant ~= nil then
                      response_handle:headers():add("x-boe-tenant-from-metadata", tenant)
                    end
                  end
          - name: envoy.filters.http.header_to_metadata
            typed_config:
              '@type': type.googleapis.com/envoy.extensions.filters.http.header_to_metadata.v3.Config
              request_rules:
              - header: x-boe-tenant-metadata
                on_header_present:
                  key: tenant
                  metadata_namespace: boe.e2e
                remove: true
          - name: envoy.filters.http.router
            typed_config:
              '@type': type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
          route_config:
            name: default_route
            virtual_hosts:
            - domains:
              - '*'
              name: default_service
              routes:
              - match:
                  prefix: /
                route:
                  cluster: test-upstream
                  host_rewrite_literal: httpbin.org
          stat_prefix: ingress_http
    name: main
