name: test-lua-with-header-to-metadata-before
version: 1.0.0
minEnvoyVersion: 1.38.0
categories:
  - Security
author: Test Author
description: Lua that reads request metadata from a native filter before it
longDescription: |
  Lua extension that reads dynamic metadata from the native
  envoy.filters.http.header_to_metadata filter declared in nativeHttpFilters.before.
type: lua
lua:
  inline: |
    local function tenant_from_metadata(handle)
      local entry = handle:streamInfo():dynamicMetadata():get("boe.e2e")
      if entry ~= nil and entry.tenant ~= nil then
        return tostring(entry.tenant)
      end
      return nil
    end

    function envoy_on_request(request_handle)
      local request_tenant = request_handle:headers():get("x-tenant-id")
      if request_tenant ~= nil then
        request_handle:headers():add("x-boe-lua-request-tenant", request_tenant)
      end

      local tenant = tenant_from_metadata(request_handle)
      if tenant ~= nil then
        request_handle:headers():add("x-boe-selected-tenant", tenant)
      end
    end

    function envoy_on_response(response_handle)
      local tenant = tenant_from_metadata(response_handle)
      if tenant ~= nil then
        response_handle:headers():add("x-boe-tenant-from-metadata", tenant)
      end
    end
tags:
  - test
license: Apache-2.0
examples:
  - title: Basic usage
    description: Run the extension
    code: |
      boe run --extension test-lua-with-header-to-metadata-before
nativeHttpFilters:
  before:
    - name: envoy.filters.http.header_to_metadata
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.filters.http.header_to_metadata.v3.Config
        request_rules:
          - header: x-tenant-id
            on_header_present:
              metadata_namespace: boe.e2e
              key: tenant
            remove: true
