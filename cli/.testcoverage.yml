profile: ./out/go-test-coverage.out
local-prefix: "github.com/tetratelabs/built-on-envoy/cli/"

threshold:
  file: 75
  package: 80
  total: 80

exclude:
  paths:
    # Covered in integration tests.
    - main.go
    - internal/envoy/runner.go
    # This is only for code generation at build time
    - internal/codegen/main.go
    # These are test-only libraries.
    - internal/testing/
    