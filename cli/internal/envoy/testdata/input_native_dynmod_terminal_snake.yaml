# Terminal dynamic_modules - rejected at config generation (post-parse check).
# Uses snake_case spelling.
name: test-extension
version: 1.0.0
categories:
  - Security
author: Test Author
description: A test extension
longDescription: |
  Terminal dynamic_modules with snake_case terminal_filter.
type: lua
lua:
  inline: |
    function envoy_on_request(request_handle) end
tags:
  - test
license: Apache-2.0
examples:
  - title: Basic usage
    description: Run the extension
    code: |
      boe run --extension test-extension
nativeHttpFilters:
  before:
    - name: envoy.filters.http.dynamic_modules
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.filters.http.dynamic_modules.v3.DynamicModuleFilter
        filter_name: t
        terminal_filter: true
        dynamic_module_config:
          name: t
