# Manifest-load passes; config-gen fails because traffic_mode is not a
# defined enum value of envoy.extensions.filters.http.mcp.v3.Mcp.TrafficMode.
name: test-extension
version: 1.0.0
categories:
  - Security
author: Test Author
description: A test extension
longDescription: |
  Malformed typed_config - must fail at config generation.
type: lua
lua:
  inline: |
    function envoy_on_request(request_handle) end
tags:
  - test
license: Apache-2.0
examples:
  - title: Basic usage
    description: Run the extension
    code: |
      boe run --extension test-extension
nativeHttpFilters:
  before:
    - name: envoy.filters.http.mcp
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.filters.http.mcp.v3.Mcp
        traffic_mode: NOT_A_VALID_ENUM_VALUE
