name: test-extension
version: 1.0.0
categories:
  - Security
author: Test Author
description: A test extension
longDescription: |
  Valid: a Go extension declaring a native header-to-metadata filter to run
  after itself and consume an internal metadata carrier header.
type: go
composerVersion: 1.2.3
tags:
  - test
license: Apache-2.0
examples:
  - title: Basic usage
    description: Run the extension
    code: |
      boe run --extension test-extension
nativeHttpFilters:
  after:
    - name: envoy.filters.http.header_to_metadata
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.filters.http.header_to_metadata.v3.Config
        request_rules:
          - header: x-boe-tenant-metadata
            on_header_present:
              metadata_namespace: boe.e2e
              key: tenant
            remove: true
