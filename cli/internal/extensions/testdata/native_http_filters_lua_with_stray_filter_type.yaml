# Locks in: a Lua manifest with a stray filterType MUST NOT be rejected by
# the HTTP-anchor rule. Lua always anchors HTTP regardless of filterType.
name: test-extension
version: 1.0.0
categories:
  - Security
author: Test Author
description: A test extension
longDescription: |
  Lua extension with a stray filterType set; nativeHttpFilters must still validate.
type: lua
filterType: network
lua:
  inline: |
    function envoy_on_request(request_handle)
      request_handle:logInfo("hi")
    end
tags:
  - test
license: Apache-2.0
examples:
  - title: Basic usage
    description: Run the extension
    code: |
      boe run --extension test-extension
nativeHttpFilters:
  before:
    - name: envoy.filters.http.mcp
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.filters.http.mcp.v3.Mcp
        traffic_mode: REJECT_NO_MCP
