name: test-extension
version: 1.0.0
categories:
  - Security
author: Test Author
description: A test extension
longDescription: |
  Valid: a Go extension declaring a native MCP filter to run before itself.
type: go
composerVersion: 1.2.3
tags:
  - test
license: Apache-2.0
examples:
  - title: Basic usage
    description: Run the extension
    code: |
      boe run --extension test-extension
nativeHttpFilters:
  before:
    - name: envoy.filters.http.mcp
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.filters.http.mcp.v3.Mcp
        traffic_mode: REJECT_NO_MCP
        request_storage_mode: DYNAMIC_METADATA_AND_FILTER_STATE
